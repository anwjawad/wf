                      </tr>
                    </thead>
                    <tbody className="divide-y divide-slate-100">
                      {wf.steps.map((st, i) => (
                        <tr key={st.id}>
                          <td className="p-2 font-bold text-slate-400 text-center">{i+1}</td>
                          <td className="p-2 font-bold text-slate-800">{st.title}</td>
                          <td className="p-2 text-slate-600">{st.description}</td>
                          <td className="p-2 font-semibold text-medical-blue">{st.role}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          ))}
        </div>
      </div>
    );

    // Main App Shell
    const App = () => {
      const [activeTab, setActiveTab] = useState('dashboard');
      const [searchQuery, setSearchQuery] = useState('');

      // Auto-scroll to top when tab changes
      useEffect(() => {
        setSearchQuery('');
      }, [activeTab]);

      const renderContent = () => {
        const wf = workflows.find(w => w.id === activeTab);
        if (wf) {
          return <WorkflowView workflow={wf} searchQuery={searchQuery} />;
        }

        switch (activeTab) {
          case 'dashboard': return <DashboardView setActiveTab={setActiveTab} />;
          case 'matrix': return <MatrixView searchQuery={searchQuery} />;
          case 'roles': return <RolesView searchQuery={searchQuery} />;
          case 'sop': return <SopView />;
          default: return <DashboardView setActiveTab={setActiveTab} />;
        }
      };

      return (
        <div className="flex h-screen bg-slate-50 overflow-hidden">
          <Sidebar activeTab={activeTab} setActiveTab={setActiveTab} />
          
          <div className="flex flex-col flex-1 overflow-hidden min-w-0">
            <Header searchQuery={searchQuery} setSearchQuery={setSearchQuery} />
            
            <main className="flex-1 overflow-hidden p-6">
              {renderContent()}
            </main>
          </div>
        </div>
      );
    };

    // Render App
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
